<div class="text-center p-3">
  <h3 class="mb-2">{{ data.name }}</h3>

  <qrcode
    [qrdata]="data.qrValue"
    [width]="220"
    [errorCorrectionLevel]="'M'">
  </qrcode>

  <p class="mt-3 text-muted">
    Scan to see user details
  </p>

  <button
    mat-raised-button
    color="primary"
    (click)="close()">
    Close
  </button>
</div>
